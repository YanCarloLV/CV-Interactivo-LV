<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Carrito</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="main-container head">
            <button onclick="location.href='index.html'" class="back-btn">←</button>
            <h3>Mi Carrito</h3>
            <div></div>
        </div>
    </header>

    <div class="main-container" style="margin-top:20px;">
        <div id="lista-carrito"></div>
        
        <div id="resumen-pago" class="card-resumen">
            <div class="row"><span>Total:</span><h2 id="total-val">$0 MXN</h2></div>
            <button class="btn-primary" onclick="finalizarWhatsApp()">Finalizar pedido 💬</button>
        </div>

        <div id="carrito-vacio" class="empty-state">
            <p>🛒 Tu carrito está vacío</p>
            <button onclick="location.href='index.html'">Ir a comprar</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>document.addEventListener('DOMContentLoaded', renderizarCarrito);</script>
</body>
</html>
